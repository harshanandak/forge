<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forge — Kernel Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- ============ Sidebar ============ -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand__mark" aria-hidden="true">F</div>
        <div>
          <div class="brand__name">Forge</div>
          <div class="brand__ver" id="brandVer">kernel dashboard</div>
        </div>
      </div>

      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="globalSearch" type="search" placeholder="Search issues, epics, decisions…" autocomplete="off" />
        <span class="search__kbd">/</span>
        <div class="searchresults" id="searchResults"></div>
      </div>

      <nav class="nav" id="nav">
        <div class="nav__label">Views</div>
        <!-- nav items injected by app.js -->
      </nav>

      <div class="sidebar__foot">
        <button class="themetoggle" id="themeToggle" type="button" aria-label="Toggle theme">
          <span id="themeLabel">Light</span> mode
        </button>
        <div class="sidebar__meta" id="sidebarMeta">loading…</div>
      </div>
    </aside>

    <!-- ============ Main ============ -->
    <main class="main">
      <header class="topbar">
        <button class="menu" id="menuBtn" aria-label="Menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <h1 id="viewTitle">Overview</h1>
        <span class="crumb" id="viewCrumb"></span>
        <div class="topbar__spacer"></div>
        <div class="updated" id="updated"><span class="pulse"></span><span id="updatedText">—</span></div>
        <button class="btn" id="refreshBtn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
          Refresh
        </button>
      </header>

      <div class="view" id="view"><!-- routed view injected here --></div>
    </main>
  </div>

  <!-- Baked kernel snapshot (window.FORGE_SNAPSHOT). Regenerate: node generate-snapshot.mjs -->
  <script src="snapshot.js"></script>
  <script src="app.js"></script>
</body>
</html>
