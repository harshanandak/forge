name: PR Monitor

# Surface + label PR monitor. On every PR event it reads the PR's open review +
# check state, keeps a SINGLE sticky comment up to date so async review-bot
# (CodeRabbit / Greptile / Qodo) or human feedback in a window nobody is watching
# never rots, AND lands ONE actionable `pr-verdict:*` label (the cheap agent read).
# It LABELS state (check-failed / threads-open / mergeable / …) and, in Tier-2
# (issue addf5297), takes at most ONE of two SAFE, fail-closed ACTIONS off the same
# verdict: update-branch on an otherwise-clean-behind PR, or re-run a genuinely
# infrastructural (cancelled/timed-out/stale) required check once per head SHA. It
# still NEVER merges the PR, NEVER resolves review threads, NEVER force-pushes,
# NEVER touches code, NEVER blocks, and is fail-closed (`unknown` on unreadable
# signals). The decision core is lib/pr-monitor/auto-actions.js (unit-tested);
# per-head-SHA idempotency markers (`forge/auto-update`, `forge/auto-rerun`) keep
# it loop-safe.
#
# Signal source: Forge's own agnostic gather, `forge shepherd <pr> --bundle
# --json` (lib/pr-bundle.js) for the sticky's threads/checks. Unresolved threads
# come from GraphQL reviewThreads{isResolved} across ALL authors — no name-list,
# no bot is privileged. The verdict label + sticky headline read the SAME value
# `forge shepherd <pr> --pull --json` emits (lib/pr-pull.js computeVerdict) — one
# verdict, no second ladder to drift. Kernel issues: 35ee8d78 (auto-trigger),
# b5c154cd (verdict label), c01936be (--pull verdict), c2d398e5 (epic).

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, dismissed]
  pull_request_review_comment:
    types: [created]
  # NOTE: there is deliberately NO `pull_request_review_thread` trigger here.
  # GitHub Actions does NOT support it as a workflow `on:` event (it's a webhook
  # event only — actionlint flags it, and it silently never fires), so resolving
  # the LAST unresolved thread has no dedicated re-run trigger. That threads-open
  # signal instead clears on the NEXT event that DOES re-run the monitor —
  # pull_request_review (submitted/dismissed), pull_request_review_comment,
  # issue_comment, or check_suite — which in practice accompanies almost every
  # thread-resolving action. The label may briefly lag a pure "click resolve, no
  # comment" until then; that's the accepted fail-closed tradeoff (CodeRabbit PR #403).
  issue_comment:
    types: [created]
  check_suite:
    types: [completed]

# Tier-1 (surface/label) needs only read + PR/checks write. Tier-2 auto-actions
# add two scoped writes: `contents: write` for the update-branch merge (merge base
# INTO an otherwise-clean-behind PR — never a PR merge), and `actions: write` to
# re-run a genuinely-flaky required check. For fork PRs (`pull_request` from a
# fork) GitHub hands this workflow a READ-ONLY token regardless of this block, so
# these elevated scopes only ever apply to same-repo PRs — forks are also skipped
# explicitly by the decision core (auto-actions isFork guard).
permissions:
  contents: write
  pull-requests: write
  checks: write
  actions: write

# DELIBERATELY NO `concurrency:` group. A per-PR group does NOT help here: GitHub's
# queue replacement cancels the previously-PENDING run in a group UNCONDITIONALLY
# (independent of cancel-in-progress), and this workflow bursts hard —
# check_suite:completed alone fires ~10+ times per push, plus reviews/comments — so
# a group left a trail of CANCELLED runs. Those render as red/non-SUCCESS checks on
# the PR head, alarm humans, and trip merge-gate tooling (Forge's own pr-bundle) that
# treats any non-SUCCESS check as a failure (kernel issue 97e6a146). Without a group,
# nothing gets cancelled. The only race a group used to guard — two concurrent
# first-runs both creating a sticky comment — is instead closed deterministically by
# the reconcile-to-one upsert (lib/pr-monitor/upsert-sticky.js), which keeps the
# lowest-id sticky and deletes the rest, converging to EXACTLY ONE per PR.

jobs:
  monitor:
    name: Surface PR review + check state
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number
        id: resolve
        run: |
          set -uo pipefail
          # Use the runner-provided env vars ($GITHUB_EVENT_NAME / $GITHUB_EVENT_PATH),
          # which are ALWAYS set — the github.event_path expression context can resolve
          # empty, which previously handed jq an empty filename and failed the job.
          EVENT_NAME="${GITHUB_EVENT_NAME:-}"
          EVENT_PATH="${GITHUB_EVENT_PATH:-}"
          PR=""
          if [ -z "$EVENT_PATH" ] || [ ! -f "$EVENT_PATH" ]; then
            echo "No event payload file ('$EVENT_PATH'); clean no-op."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # jq errors are swallowed (|| true): a monitor must never red-X itself on an
          # unrelated or malformed event — no PR context means a clean no-op, not a fail.
          case "$EVENT_NAME" in
            pull_request|pull_request_review|pull_request_review_comment)
              PR=$(jq -r '.pull_request.number // empty' "$EVENT_PATH" 2>/dev/null || true) ;;
            issue_comment)
              # Only PR comments carry .issue.pull_request; plain issue comments are skipped.
              if [ "$(jq -r '.issue.pull_request // empty' "$EVENT_PATH" 2>/dev/null || true)" != "" ]; then
                PR=$(jq -r '.issue.number // empty' "$EVENT_PATH" 2>/dev/null || true)
              fi ;;
            check_suite)
              # No direct PR number; may be empty for forks/detached suites — then skip.
              PR=$(jq -r '.check_suite.pull_requests[0].number // empty' "$EVENT_PATH" 2>/dev/null || true) ;;
            *)
              PR="" ;;
          esac
          if [ -z "$PR" ]; then
            echo "No PR associated with event '$EVENT_NAME'; clean no-op."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Resolved PR #$PR from event '$EVENT_NAME'."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "pr=$PR" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.resolve.outputs.should_run == 'true'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # Do not persist GITHUB_TOKEN in the checkout's git config: all GitHub
          # access goes through gh/the API (GH_TOKEN env), and the bundle's git
          # ops are read-only against already-fetched refs. No credential is needed
          # in .git/config, so leaving one there only widens the attack surface.
          persist-credentials: false

      - name: Setup Bun
        if: steps.resolve.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        if: steps.resolve.outputs.should_run == 'true'
        run: bun install

      - name: Gather PR-state bundle (author-agnostic, read-only)
        if: steps.resolve.outputs.should_run == 'true'
        id: gather
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ steps.resolve.outputs.pr }}
        run: |
          set -uo pipefail
          # Reuse Forge's own agnostic gather so the monitor and the CLI share one
          # implementation. Read-only: --bundle decides nothing and takes no action.
          # On success we stamp ciAvailable:true — the shepherd bundle doesn't carry
          # that flag, and the renderer treats a missing flag as "unread" (fail-closed),
          # so we must assert here that CI WAS read on this path.
          if node bin/forge.js shepherd "$PR" --bundle --json > raw.json 2> gather.err \
             && jq '. + {ciAvailable: true}' raw.json > bundle.json 2>/dev/null; then
            echo "gathered=true" >> "$GITHUB_OUTPUT"
          else
            echo "gathered=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Bundle gather failed; posting a degraded surface. See log."
            cat gather.err || true
            # Fail-closed degraded bundle: NEITHER threads NOR checks were read, so
            # both availability flags are false — the renderer surfaces both as
            # unreadable rather than a false "zero unresolved / no failing checks".
            # Build with `jq --arg` (NOT manual escaping): gather.err can contain
            # backslashes, tabs, control chars, or a truncated multibyte sequence that
            # hand-escaping only quotes/newlines would turn into invalid JSON — making
            # the fail-closed path itself fail (CodeRabbit PR #403).
            ERR=$(head -c 300 gather.err 2>/dev/null || true)
            jq -n --arg pr "$PR" --arg err "gather failed: $ERR" '{
              pr: $pr,
              unresolvedComments: [],
              unresolvedCommentsAvailable: false,
              unresolvedCommentsError: $err,
              ciAvailable: false,
              mergeState: { mergeable: "UNKNOWN", mergeStateStatus: "UNKNOWN", state: "OPEN" },
              ci: { checks: [], failing: [], pending: [] },
              branch: { ahead: 0, behind: 0 }
            }' > bundle.json
          fi

      - name: Gather merge verdict (single source — forge shepherd --pull)
        if: steps.resolve.outputs.should_run == 'true'
        id: pullverdict
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ steps.resolve.outputs.pr }}
        run: |
          set -uo pipefail
          # The verdict is the SAME code `forge shepherd <pr> --pull --json` emits
          # (lib/pr-pull.js computeVerdict) — the label + sticky headline read it
          # here rather than recomputing, so they can never disagree with --pull.
          # Fail-closed: any gather failure or a missing field yields UNKNOWN.
          if node bin/forge.js shepherd "$PR" --pull --json > pull.json 2> pull.err; then
            VERDICT=$(jq -r '.verdict // "UNKNOWN"' pull.json 2>/dev/null || echo UNKNOWN)
          else
            echo "::warning::--pull gather failed; verdict falls closed to UNKNOWN. See log."
            cat pull.err || true
            VERDICT=UNKNOWN
          fi
          [ -z "$VERDICT" ] && VERDICT=UNKNOWN
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "Merge verdict: $VERDICT"

      - name: Render sticky comment body
        if: steps.resolve.outputs.should_run == 'true'
        env:
          VERDICT: ${{ steps.pullverdict.outputs.verdict }}
        run: |
          set -euo pipefail
          # Pass the --pull verdict into the renderer so the sticky leads with the
          # SAME verdict as the pr-verdict:* label (render-sticky only displays it).
          node -e '
            const { renderStickyComment } = require("./lib/pr-monitor/render-sticky");
            const bundle = JSON.parse(require("fs").readFileSync("bundle.json", "utf8"));
            const { body } = renderStickyComment(bundle, { verdict: process.env.VERDICT });
            require("fs").writeFileSync("monitor-body.md", body);
          '
          # jq -Rs slurps the raw markdown into a JSON string for the comment API.
          jq -Rs '{body: .}' monitor-body.md > monitor-payload.json

      - name: Upsert sticky comment (race-safe, exactly one)
        if: steps.resolve.outputs.should_run == 'true'
        # Best-effort: a transient gh/network failure must NOT fail the job and
        # produce the very non-success check this monitor exists to avoid. A real
        # (non-already-gone) error still surfaces as a failed step annotation.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ steps.resolve.outputs.pr }}
          STICKY_PAYLOAD_FILE: monitor-payload.json
        run: |
          set -euo pipefail
          # Reconcile the PR's sticky comments to EXACTLY ONE: find prior stickies by
          # their hidden marker, update the oldest (lowest-id) in place, and delete any
          # duplicates a concurrent run created. Because this workflow has no
          # concurrency group (see the top-of-file note), two first-runs could each
          # create a sticky; the deterministic lowest-id survivor closes that race.
          node lib/pr-monitor/upsert-sticky.js

      - name: Compute pr-verdict label
        if: steps.resolve.outputs.should_run == 'true'
        id: label
        # Map the --pull verdict to its single `pr-verdict:<verdict>` label using
        # lib/pr-pull.js's own enum (no second verdict logic). Emits `label` +
        # `all_labels` to $GITHUB_OUTPUT.
        env:
          VERDICT: ${{ steps.pullverdict.outputs.verdict }}
        run: |
          set -euo pipefail
          node scripts/pr-verdict-label.js "$VERDICT"

      - name: Reconcile single pr-verdict label
        if: steps.resolve.outputs.should_run == 'true'
        # Best-effort: a label reconcile must never fail the job and produce the
        # non-success check this monitor exists to avoid.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ steps.resolve.outputs.pr }}
          LABEL: ${{ steps.label.outputs.label }}
          ALL_LABELS: ${{ steps.label.outputs.all_labels }}
        run: |
          set -uo pipefail
          # Keep EXACTLY ONE pr-verdict:* label on the PR — the cheap agent-agnostic
          # read (`gh pr view <pr> --json labels`). Ensure the chosen label exists
          # (upsert), then remove EVERY OTHER label in the pr-verdict:* enum (not just
          # a presumed single sibling, so multiple stale ones can't linger), and add
          # the chosen one. Surface only: a LABEL never merges, resolves, or blocks.
          gh label create "$LABEL" --repo "$GH_REPO" --force --color BFD4F2 \
            --description "Forge PR verdict (auto, surface only)" > /dev/null 2>&1 || true
          IFS=',' read -ra LABELS <<< "$ALL_LABELS"
          for L in "${LABELS[@]}"; do
            [ -z "$L" ] && continue
            if [ "$L" != "$LABEL" ]; then
              gh pr edit "$PR" --repo "$GH_REPO" --remove-label "$L" > /dev/null 2>&1 || true
            fi
          done
          if gh pr edit "$PR" --repo "$GH_REPO" --add-label "$LABEL" > /dev/null 2>&1; then
            echo "Set label $LABEL on PR #$PR"
          else
            echo "::warning::Could not set label $LABEL (non-fatal)."
          fi

      - name: Publish informational (neutral) check
        if: steps.resolve.outputs.should_run == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ steps.resolve.outputs.pr }}
        run: |
          set -uo pipefail
          # A NEUTRAL check run is informational by construction — it can never
          # read as a pass/fail merge verdict and never blocks merge. Best-effort.
          SHA=$(gh pr view "$PR" --repo "$GH_REPO" --json headRefOid --jq '.headRefOid' 2>/dev/null || true)
          if [ -z "$SHA" ]; then
            echo "No head sha resolved; skipping informational check."
            exit 0
          fi
          gh api -X POST "repos/$GH_REPO/check-runs" \
            -f name='forge/pr-monitor' \
            -f head_sha="$SHA" \
            -f status='completed' \
            -f conclusion='neutral' \
            -f 'output[title]=PR monitor surfaced review + check state' \
            -f 'output[summary]=See the Forge PR Monitor sticky comment + the pr-verdict:* label. Surface-only: labels state, never merges, never resolves threads.' \
            > /dev/null && echo "Published neutral check for $SHA" || echo "::warning::Neutral check publish failed (non-fatal)."

      # ---------------------------------------------------------------------------
      # TIER-2 auto-actions (issue addf5297). Everything ABOVE surfaces state and
      # NEVER changes the PR; everything BELOW may take ONE of two SAFE, fail-closed
      # actions keyed off the SAME `--pull` verdict payload (pull.json). All steps
      # are best-effort (continue-on-error) so an action can NEVER red-X the monitor
      # or block merge. The honest line is preserved: it may update-branch and
      # rerun-flaky, but it NEVER merges, NEVER resolves threads, NEVER force-pushes,
      # NEVER touches code.
      # ---------------------------------------------------------------------------
      - name: Decide auto-actions (surface-safe)
        if: steps.resolve.outputs.should_run == 'true'
        id: autoact
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ steps.resolve.outputs.pr }}
        run: |
          set -uo pipefail
          # pull.json is the SAME `--pull --json` payload the verdict step read; the
          # decision core (lib/pr-monitor/auto-actions, unit-tested) turns it into
          # update_branch / rerun flags. Fork PRs skip the branch update (a base-repo
          # token cannot push a fork). A failed fork read falls closed to isFork=true.
          IS_FORK=$(gh pr view "$PR" --repo "$GH_REPO" --json isCrossRepository --jq '.isCrossRepository' 2>/dev/null || echo true)
          node scripts/pr-auto-actions.js pull.json "$IS_FORK"

      - name: 'Auto-action: update otherwise-clean-behind branch'
        if: steps.resolve.outputs.should_run == 'true' && steps.autoact.outputs.update_branch == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ steps.resolve.outputs.pr }}
        run: |
          set -uo pipefail
          # Merge base INTO the PR branch — the "last mile" for a clean-but-behind PR.
          # This is NOT a PR merge and touches no code; it only clears BEHIND churn.
          SHA=$(gh pr view "$PR" --repo "$GH_REPO" --json headRefOid --jq '.headRefOid' 2>/dev/null || true)
          if [ -z "$SHA" ]; then echo "No head sha; skip auto-update."; exit 0; fi
          # Idempotency + anti-loop: a per-head-SHA marker check-run. Skip if we
          # already acted on THIS sha. A SUCCESSFUL update changes the head sha, so
          # the CI run it triggers is a NEW sha that is no longer BEHIND and will not
          # re-fire — the marker only suppresses redundant fires within the burst of
          # events on the same sha (check_suite alone fires ~10x/push; see the #394
          # history on why we must not churn the same sha).
          EXISTING=$(gh api "repos/$GH_REPO/commits/$SHA/check-runs" --jq '[.check_runs[]|select(.name=="forge/auto-update")]|length' 2>/dev/null || echo 0)
          if [ "$EXISTING" != "0" ]; then echo "Already auto-updated $SHA; skip."; exit 0; fi
          # expected_head_sha makes GitHub reject the update if the head moved since
          # we read it (guards against acting on a stale sha).
          if gh api -X PUT "repos/$GH_REPO/pulls/$PR/update-branch" -f expected_head_sha="$SHA" > update.out 2>&1; then
            echo "update-branch requested for PR #$PR @ $SHA"
          else
            echo "::warning::update-branch failed (non-fatal):"; cat update.out || true
          fi
          # Stamp the marker regardless of the update's outcome so a transient failure
          # does not re-loop on this same sha (the next push mints a new sha to retry).
          gh api -X POST "repos/$GH_REPO/check-runs" \
            -f name='forge/auto-update' \
            -f head_sha="$SHA" \
            -f status='completed' \
            -f conclusion='neutral' \
            -f 'output[title]=Forge auto-update-branch (otherwise-clean-behind)' \
            -f 'output[summary]=Merged base into an otherwise-clean-behind PR. Surface-safe: never merges the PR, never resolves threads, never touches code.' \
            > /dev/null 2>&1 || true

      - name: 'Auto-action: rerun genuinely-flaky required check (once)'
        if: steps.resolve.outputs.should_run == 'true' && steps.autoact.outputs.rerun == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ steps.resolve.outputs.pr }}
          RERUN_RUN_IDS: ${{ steps.autoact.outputs.rerun_run_ids }}
        run: |
          set -uo pipefail
          # Re-run ONLY the failed jobs of runs whose required check failed with an
          # INFRASTRUCTURAL conclusion (cancelled/timed-out/stale/startup-failure) —
          # never a real FAILURE (the decision core fails the whole rerun closed if
          # ANY failing required check is a genuine failure). Once per head sha.
          SHA=$(gh pr view "$PR" --repo "$GH_REPO" --json headRefOid --jq '.headRefOid' 2>/dev/null || true)
          if [ -z "$SHA" ]; then echo "No head sha; skip rerun."; exit 0; fi
          EXISTING=$(gh api "repos/$GH_REPO/commits/$SHA/check-runs" --jq '[.check_runs[]|select(.name=="forge/auto-rerun")]|length' 2>/dev/null || echo 0)
          if [ "$EXISTING" != "0" ]; then echo "Already reran for $SHA; skip."; exit 0; fi
          IFS=',' read -ra IDS <<< "${RERUN_RUN_IDS:-}"
          for RID in "${IDS[@]}"; do
            [ -z "$RID" ] && continue
            if gh run rerun "$RID" --failed > /dev/null 2>&1; then
              echo "Re-ran failed jobs of run $RID"
            else
              echo "::warning::rerun of run $RID failed (non-fatal)."
            fi
          done
          gh api -X POST "repos/$GH_REPO/check-runs" \
            -f name='forge/auto-rerun' \
            -f head_sha="$SHA" \
            -f status='completed' \
            -f conclusion='neutral' \
            -f 'output[title]=Forge auto-rerun flaky required check' \
            -f 'output[summary]=Re-ran the failed jobs of an infrastructural (cancelled/timed-out/stale) required check once. Surface-safe: never merges, never resolves threads.' \
            > /dev/null 2>&1 || true
