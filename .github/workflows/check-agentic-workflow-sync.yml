name: Check Agentic Workflow Sync
on:
  pull_request:
    paths:
      - '.github/agentic-workflows/*.md'
      - '.github/agentic-workflows/*.lock.yml'
      - '.github/workflows/behavioral-test.md'
      - '.github/workflows/behavioral-test.lock.yml'
      - 'scripts/sync-agentic-workflow.js'
permissions:
  contents: read

jobs:
  sync-check:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
      - name: Check active workflow files are synced
        run: node scripts/sync-agentic-workflow.js --check
      - name: Install gh-aw CLI
        run: |
          if gh extension list | grep -q 'gh-aw'; then
            gh extension upgrade gh-aw
          else
            gh extension install github/gh-aw
          fi
      - name: Compile active workflow
        run: gh aw compile --validate --strict .github/workflows/behavioral-test.md
      - name: Trial active workflow
        run: gh aw trial ./.github/workflows/behavioral-test.md --dry-run
      - name: Verify compiled workflow artifacts exist
        run: |
          test -f .github/workflows/behavioral-test.md
          test -f .github/workflows/behavioral-test.lock.yml
          git diff --exit-code -- .github/workflows/behavioral-test.md .github/workflows/behavioral-test.lock.yml
