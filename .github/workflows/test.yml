name: Tests

on:
  push:
    branches: [master]
    paths:
      - 'bin/**'
      - 'lib/**'
      - 'scripts/**'
      - 'test/**'
      - 'test-env/**'
      - 'packages/**'
      - 'package.json'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'bin/**'
      - 'lib/**'
      - 'scripts/**'
      - 'test/**'
      - 'test-env/**'
      - 'packages/**'
      - 'package.json'
      - '.github/workflows/**'
  workflow_dispatch:  # Allow manual workflow runs
  schedule:
    - cron: '0 3 * * 0'  # Weekly mutation testing: Sunday 3am UTC

# Limit GITHUB_TOKEN permissions to minimum required
permissions:
  contents: read

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Suite
    if: github.event_name != 'pull_request' || github.event.action != 'synchronize'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [22, 24]  # Node 20 dropped: deprecated by GitHub, causes Bun segfault on Windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5

      - name: Install dependencies
        run: bun install

      - name: Setup test fixtures (Unix)
        if: runner.os != 'Windows'
        run: bash test-env/automation/setup-fixtures.sh --force

      - name: Setup test fixtures (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: bash test-env/automation/setup-fixtures.sh --force

      - name: Run unit tests (Bun)
        run: bun test test/

      - name: Run edge-case tests (Node)
        run: node --test test-env/**/*.test.js || true  # node:test runner for test-env/ (incompatible with Bun)

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results - ${{ matrix.os }} / Node ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          echo "✓ Validation tests completed" >> $GITHUB_STEP_SUMMARY
          echo "✓ Edge case tests completed" >> $GITHUB_STEP_SUMMARY
          echo "✓ Automation tests completed" >> $GITHUB_STEP_SUMMARY

  followup-tests:
    name: Targeted PR Tests
    if: github.event_name == 'pull_request' && github.event.action == 'synchronize'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5

      - name: Install dependencies
        run: bun install

      - name: Setup test fixtures
        run: bash test-env/automation/setup-fixtures.sh --force

      - name: Resolve affected test targets
        id: affected
        shell: bash
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"
          mapfile -t changed_files < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

          declare -A seen=()
          test_targets=()
          run_test_env=false
          run_e2e=false
          unmapped_files=false

          add_target() {
            local target="$1"
            if [[ -n "$target" && -f "$target" && -z "${seen[$target]:-}" ]]; then
              seen["$target"]=1
              test_targets+=("$target")
            fi
          }

          for file in "${changed_files[@]}"; do
            case "$file" in
              test-env/*)
                run_test_env=true
                ;;
              test/e2e/*)
                run_e2e=true
                ;;
              test/*.test.js|test/**/*.test.js)
                add_target "$file"
                ;;
              lib/*.js|lib/**/*.js)
                run_test_env=true
                candidate="test/${file#lib/}"
                add_target "${candidate%.js}.test.js"
                ;;
              scripts/*.js|scripts/**/*.js)
                run_test_env=true
                relative="${file#scripts/}"
                add_target "test/scripts/${relative%.js}.test.js"
                add_target "test/${relative%.js}.test.js"
                ;;
              .github/workflows/*)
                workflow_name="$(basename "${file%.*}")"
                add_target "test/workflows/${workflow_name}.test.js"
                add_target "test/ci-workflow.test.js"
                ;;
              package.json|bun.lockb|pnpm-lock.yaml|yarn.lock|package-lock.json|packages/*)
                echo "mode=full" >> "$GITHUB_OUTPUT"
                echo "run_test_env=true" >> "$GITHUB_OUTPUT"
                echo "run_e2e=true" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
              *)
                unmapped_files=true
                run_test_env=true
                ;;
            esac
          done

          if [[ "$unmapped_files" == "true" ]]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
          elif [[ "${#test_targets[@]}" -gt 0 ]]; then
            {
              echo "mode=targeted"
              echo "targets<<EOF"
              printf '%s\n' "${test_targets[@]}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "mode=full" >> "$GITHUB_OUTPUT"
          fi

          echo "run_test_env=${run_test_env}" >> "$GITHUB_OUTPUT"
          echo "run_e2e=${run_e2e}" >> "$GITHUB_OUTPUT"

      - name: Run targeted unit tests
        if: steps.affected.outputs.mode == 'targeted'
        shell: bash
        run: |
          mapfile -t test_targets <<'EOF'
          ${{ steps.affected.outputs.targets }}
          EOF
          bun test "${test_targets[@]}"

      - name: Run single-platform unit suite fallback
        if: steps.affected.outputs.mode == 'full'
        run: bun test test/

      - name: Run affected e2e tests
        if: steps.affected.outputs.run_e2e == 'true'
        run: bun test test/e2e/

      - name: Run affected edge-case tests
        if: steps.affected.outputs.run_test_env == 'true'
        run: node --test test-env/**/*.test.js || true

  coverage:
    name: Code Coverage
    if: github.event_name != 'pull_request' || github.event.action != 'synchronize'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5

      - name: Install dependencies
        run: bun install

      - name: Setup test fixtures
        run: bash test-env/automation/setup-fixtures.sh --force

      - name: Run tests with coverage
        run: bun test --coverage test/ # Exclude test-env/ (uses node:test, incompatible with Bun)

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Coverage summary
        if: always()
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Coverage thresholds: 80% (lines, branches, functions, statements)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            echo "✓ Coverage report generated" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Coverage report not found" >> $GITHUB_STEP_SUMMARY
          fi

  e2e:
    name: E2E Tests
    if: github.event_name != 'pull_request' || github.event.action != 'synchronize'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5

      - name: Install dependencies
        run: bun install

      - name: Run E2E tests
        run: bun test test/e2e/

      - name: E2E summary
        if: always()
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✓ Scaffold utilities tests" >> $GITHUB_STEP_SUMMARY
          echo "✓ Fixture validation tests" >> $GITHUB_STEP_SUMMARY
          echo "✓ Snapshot tests" >> $GITHUB_STEP_SUMMARY

  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5

      - name: Install dependencies
        run: bun install

      - name: Setup test fixtures
        run: bash test-env/automation/setup-fixtures.sh --force

      - name: Run mutation testing
        run: npx stryker run

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: stryker-report/
          retention-days: 30

      - name: Mutation summary
        if: always()
        run: |
          echo "## Mutation Testing Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f stryker-report/mutation.json ]; then
            echo "✓ Mutation report generated" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Mutation report not found" >> $GITHUB_STEP_SUMMARY
          fi

  dashboard:
    name: Test Dashboard
    if: github.event_name != 'pull_request' || github.event.action != 'synchronize'
    runs-on: ubuntu-latest
    needs: [test, coverage]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5

      - name: Install dependencies
        run: bun install

      - name: Generate test dashboard
        run: node scripts/test-dashboard.js

      - name: Upload dashboard
        uses: actions/upload-artifact@v4
        with:
          name: test-dashboard
          path: test-dashboard.json
          retention-days: 7

      - name: Dashboard summary
        if: always()
        run: |
          echo "## Test Quality Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f test-dashboard.json ]; then
            cat test-dashboard.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Tests: {d[\"testCount\"]}'); print(f'Coverage threshold: {d[\"coverageThreshold\"]}%'); print(f'ESLint warnings: {d[\"eslintWarnings\"]}')" >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "✓ Dashboard generated" >> $GITHUB_STEP_SUMMARY
          fi
