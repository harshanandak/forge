name: Tests

on:
  push:
    branches: [master]
    paths:
      - 'bin/**'
      - 'lib/**'
      - 'scripts/**'
      - 'test/**'
      - 'test-env/**'
      - 'packages/**'
      - 'package.json'
      - 'bunfig.toml'
      - '.github/workflows/**'
      - '.github/agentic-workflows/**'
  pull_request:
    paths:
      - 'bin/**'
      - 'lib/**'
      - 'scripts/**'
      - 'test/**'
      - 'test-env/**'
      - 'packages/**'
      - 'package.json'
      - 'bunfig.toml'
      - '.github/workflows/**'
      - '.github/agentic-workflows/**'
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'

permissions:
  contents: read

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  full-matrix:
    name: Full Matrix (${{ matrix.os }} / Node ${{ matrix.node-version }})
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [22, 24]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5
      - name: Install dependencies
        run: bun install
      - name: Setup test fixtures (Unix)
        if: runner.os != 'Windows'
        run: bash test-env/automation/setup-fixtures.sh --force
      - name: Setup test fixtures (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: bash test-env/automation/setup-fixtures.sh --force
      - name: Run matrix unit tests
        run: bun test test/ --reporter=junit --reporter-outfile test-results/full-matrix-${{ matrix.os }}-node${{ matrix.node-version }}.xml
      - name: Build matrix test profile
        run: node scripts/test-profile.js --input-dir test-results --output test-results/full-matrix-${{ matrix.os }}-node${{ matrix.node-version }}.profile.json --label full-matrix-${{ matrix.os }}-node${{ matrix.node-version }} --integration-skipped true
      - name: Upload matrix artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-artifacts-full-matrix-${{ matrix.os }}-node${{ matrix.node-version }}
          path: test-results/
          retention-days: 7

  unit-shard:
    name: Unit Shard ${{ matrix.shard-index }}
    if: github.event_name == 'pull_request' && github.event.action != 'synchronize'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        shard-index: [0, 1, 2, 3]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5
      - name: Install dependencies
        run: bun install
      - name: Setup test fixtures
        run: bash test-env/automation/setup-fixtures.sh --force
      - name: Run unit shard
        run: bun run test:ci:shard -- --mode shard --shard-index ${{ matrix.shard-index }} --shard-total 4 --label unit-shard-${{ matrix.shard-index }}
      - name: Build unit shard profile
        run: node scripts/test-profile.js --input-dir test-results --output test-results/unit-shard-${{ matrix.shard-index }}.profile.json --label unit-shard-${{ matrix.shard-index }} --integration-skipped true
      - name: Publish unit shard summary
        if: always()
        shell: bash
        run: |
          dashboard_json="$(node scripts/test-dashboard.js --json --profiles-dir test-results)"
          node -e "const d = JSON.parse(process.argv[1]); const lines = ['## Unit Shard Summary', '', 'Suite duration: ' + d.suiteDurationMs + 'ms', 'Integration skipped: ' + (d.integrationSkipped ? 'yes' : 'no')]; if (d.slowestFiles.length) { lines.push('', 'Slowest files:'); for (const entry of d.slowestFiles.slice(0, 5)) lines.push('- ' + entry.file + ': ' + entry.durationMs + 'ms'); } console.log(lines.join('\n'));" "$dashboard_json" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload unit shard artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-artifacts-unit-shard-${{ matrix.shard-index }}
          path: test-results/
          retention-days: 7

  windows-smoke:
    name: Windows Smoke
    if: github.event_name == 'pull_request' && github.event.action != 'synchronize'
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5
      - name: Install dependencies
        run: bun install
      - name: Run Windows smoke tests
        run: bun run test:ci:shard -- --mode smoke --label windows-smoke
      - name: Build Windows smoke profile
        run: node scripts/test-profile.js --input-dir test-results --output test-results/windows-smoke.profile.json --label windows-smoke --integration-skipped true
      - name: Publish Windows smoke summary
        if: always()
        shell: bash
        run: |
          dashboard_json="$(node scripts/test-dashboard.js --json --profiles-dir test-results)"
          node -e "const d = JSON.parse(process.argv[1]); console.log(['## Windows Smoke Summary', '', 'Suite duration: ' + d.suiteDurationMs + 'ms'].join('\n'));" "$dashboard_json" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Windows smoke artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-artifacts-windows-smoke
          path: test-results/
          retention-days: 7

  macos-smoke:
    name: macOS Smoke
    if: github.event_name == 'pull_request' && github.event.action != 'synchronize'
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5
      - name: Install dependencies
        run: bun install
      - name: Run macOS smoke tests
        run: bun run test:ci:shard -- --mode smoke --label macos-smoke
      - name: Build macOS smoke profile
        run: node scripts/test-profile.js --input-dir test-results --output test-results/macos-smoke.profile.json --label macos-smoke --integration-skipped true
      - name: Publish macOS smoke summary
        if: always()
        shell: bash
        run: |
          dashboard_json="$(node scripts/test-dashboard.js --json --profiles-dir test-results)"
          node -e "const d = JSON.parse(process.argv[1]); console.log(['## macOS Smoke Summary', '', 'Suite duration: ' + d.suiteDurationMs + 'ms'].join('\n'));" "$dashboard_json" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload macOS smoke artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-artifacts-macos-smoke
          path: test-results/
          retention-days: 7

  followup-tests:
    name: Targeted PR Tests
    if: github.event_name == 'pull_request' && github.event.action == 'synchronize'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5
      - name: Install dependencies
        run: bun install
      - name: Setup test fixtures
        run: bash test-env/automation/setup-fixtures.sh --force
      - name: Resolve affected test targets
        id: affected
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          node <<'EOF'
          const { execFileSync } = require('node:child_process');
          const { buildTestExecutionPlan } = require('./scripts/test');

          const baseSha = process.env.BASE_SHA;
          const headSha = process.env.HEAD_SHA;
          const outputPath = process.env.GITHUB_OUTPUT;
          const diffOutput = execFileSync('git', ['diff', '--name-only', `${baseSha}...${headSha}`], {
            encoding: 'utf8',
          });

          const execStub = (cmd, args, options = {}) => {
            if (cmd === 'git' && args[0] === 'rev-parse' && args.includes('@{upstream}')) {
              return 'origin/pull-request';
            }
            if (cmd === 'git' && args[0] === 'diff') {
              return diffOutput;
            }
            return execFileSync(cmd, args, { ...options, encoding: 'utf8' });
          };

          const plan = buildTestExecutionPlan(process.cwd(), execStub, { sinceUpstream: true });
          const lines = [
            `mode=${plan.mode}`,
            `reason=${plan.reason}`,
            `run_test_env=${plan.runTestEnv}`,
            `run_e2e=${plan.runE2E}`,
            `run_workflow_tests=${plan.runWorkflowTests}`,
          ];

          if (plan.testTargets.length > 0) {
            lines.push('targets<<EOF');
            lines.push(...plan.testTargets);
            lines.push('EOF');
          }

          require('node:fs').appendFileSync(outputPath, `${lines.join('\n')}\n`);
          EOF
      - name: Run targeted unit tests
        if: steps.affected.outputs.mode == 'targeted'
        shell: bash
        run: |
          mapfile -t test_targets <<'EOF'
          ${{ steps.affected.outputs.targets }}
          EOF
          bun test "${test_targets[@]}" --reporter=junit --reporter-outfile test-results/followup-targeted.xml
      - name: Run single-platform unit suite fallback
        if: steps.affected.outputs.mode == 'full'
        run: bun test test/ --reporter=junit --reporter-outfile test-results/followup-full.xml
      - name: Run affected e2e tests
        if: steps.affected.outputs.run_e2e == 'true'
        run: bun test test/e2e/ --reporter=junit --reporter-outfile test-results/followup-e2e.xml
      - name: Run affected edge-case tests
        if: steps.affected.outputs.run_test_env == 'true'
        run: node --test test-env/**/*.test.js || true
      - name: Build followup profile
        run: node scripts/test-profile.js --input-dir test-results --output test-results/followup.profile.json --label followup-tests --integration-skipped true
      - name: Publish followup summary
        if: always()
        shell: bash
        run: |
          dashboard_json="$(node scripts/test-dashboard.js --json --profiles-dir test-results)"
          node -e "const d = JSON.parse(process.argv[1]); const lines = ['## Follow-up Test Summary', '', 'Suite duration: ' + d.suiteDurationMs + 'ms']; if (d.slowestFiles.length) { lines.push('', 'Slowest files:'); for (const entry of d.slowestFiles.slice(0, 5)) lines.push('- ' + entry.file + ': ' + entry.durationMs + 'ms'); } console.log(lines.join('\n'));" "$dashboard_json" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload followup artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-artifacts-followup
          path: test-results/
          retention-days: 7

  coverage:
    name: Code Coverage
    if: github.event_name != 'pull_request' || github.event.action != 'synchronize'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5
      - name: Install dependencies
        run: bun install
      - name: Setup test fixtures
        run: bash test-env/automation/setup-fixtures.sh --force
      - name: Run tests with coverage
        run: bun test --coverage test/ --reporter=junit --reporter-outfile test-results/coverage.xml
      - name: Build coverage profile
        run: node scripts/test-profile.js --input-dir test-results --output test-results/coverage.profile.json --label coverage --integration-skipped true
      - name: Publish coverage runtime summary
        if: always()
        shell: bash
        run: |
          dashboard_json="$(node scripts/test-dashboard.js --json --profiles-dir test-results)"
          node -e "const d = JSON.parse(process.argv[1]); const lines = ['## Coverage Runtime Summary', '', 'Suite duration: ' + d.suiteDurationMs + 'ms']; if (d.slowestFiles.length) { lines.push('', 'Slowest files:'); for (const entry of d.slowestFiles.slice(0, 5)) lines.push('- ' + entry.file + ': ' + entry.durationMs + 'ms'); } console.log(lines.join('\n'));" "$dashboard_json" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-artifacts-coverage
          path: |
            coverage/
            test-results/
          retention-days: 7
      - name: Coverage summary
        if: always()
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Coverage thresholds: 80% (lines, branches, functions, statements)" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            echo "Coverage report generated" >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage report not found" >> $GITHUB_STEP_SUMMARY
          fi

  e2e:
    name: E2E Tests
    if: github.event_name != 'pull_request' || github.event.action != 'synchronize'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5
      - name: Install dependencies
        run: bun install
      - name: Run E2E tests
        run: bun test test/e2e/ --reporter=junit --reporter-outfile test-results/e2e.xml
      - name: Build E2E profile
        run: node scripts/test-profile.js --input-dir test-results --output test-results/e2e.profile.json --label e2e --integration-skipped true
      - name: Publish E2E runtime summary
        if: always()
        shell: bash
        run: |
          dashboard_json="$(node scripts/test-dashboard.js --json --profiles-dir test-results)"
          node -e "const d = JSON.parse(process.argv[1]); const lines = ['## E2E Runtime Summary', '', 'Suite duration: ' + d.suiteDurationMs + 'ms']; if (d.slowestFiles.length) { lines.push('', 'Slowest files:'); for (const entry of d.slowestFiles.slice(0, 5)) lines.push('- ' + entry.file + ': ' + entry.durationMs + 'ms'); } console.log(lines.join('\n'));" "$dashboard_json" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload E2E artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-artifacts-e2e
          path: test-results/
          retention-days: 7

  beads-integration:
    name: Beads Integration
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      RUN_BEADS_INTEGRATION: '1'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5
      - name: Install dependencies
        run: bun install
      - name: Run Beads integration tests
        run: bun test scripts/beads-context.test.js --reporter=junit --reporter-outfile test-results/beads-integration.xml
      - name: Build Beads integration profile
        run: node scripts/test-profile.js --input-dir test-results --output test-results/beads-integration.profile.json --label beads-integration --integration-skipped false
      - name: Publish Beads integration summary
        if: always()
        shell: bash
        run: |
          dashboard_json="$(node scripts/test-dashboard.js --json --profiles-dir test-results)"
          node -e "const d = JSON.parse(process.argv[1]); const lines = ['## Beads Integration Summary', '', 'Suite duration: ' + d.suiteDurationMs + 'ms', 'Integration skipped: ' + (d.integrationSkipped ? 'yes' : 'no')]; if (d.slowestFiles.length) { lines.push('', 'Slowest files:'); for (const entry of d.slowestFiles.slice(0, 5)) lines.push('- ' + entry.file + ': ' + entry.durationMs + 'ms'); } console.log(lines.join('\n'));" "$dashboard_json" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Beads integration artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-artifacts-beads-integration
          path: test-results/
          retention-days: 7

  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5
      - name: Install dependencies
        run: bun install
      - name: Setup test fixtures
        run: bash test-env/automation/setup-fixtures.sh --force
      - name: Run mutation testing
        run: npx stryker run
      - name: Upload mutation report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutation-report
          path: stryker-report/
          retention-days: 30

  dashboard-pr:
    name: Test Dashboard (PR)
    if: github.event_name == 'pull_request' && github.event.action != 'synchronize'
    runs-on: ubuntu-latest
    needs: [unit-shard, windows-smoke, macos-smoke, coverage, e2e]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Download test artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: test-artifacts-*
          path: test-results/downloaded
          merge-multiple: true
      - name: Generate test dashboard
        run: node scripts/test-dashboard.js --profiles-dir test-results/downloaded
      - name: Upload dashboard
        uses: actions/upload-artifact@v7
        with:
          name: test-dashboard
          path: test-dashboard.json
          retention-days: 7
      - name: Dashboard summary
        if: always()
        run: |
          echo "## Test Quality Dashboard" >> $GITHUB_STEP_SUMMARY
          if [ -f test-dashboard.json ]; then
            cat test-dashboard.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Tests: {d[\"testCount\"]}'); print(f'Suite duration: {d[\"suiteDurationMs\"]}ms'); print(f'Integration skipped: {d[\"integrationSkipped\"]}'); print('Slowest files:'); [print(f'- {item[\"file\"]}: {item[\"durationMs\"]}ms') for item in d.get(\"slowestFiles\", [])[:5]]" >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Dashboard generated" >> $GITHUB_STEP_SUMMARY
          fi

  dashboard-confidence:
    name: Test Dashboard (Confidence Lane)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [full-matrix, coverage, e2e, beads-integration]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Download test artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: test-artifacts-*
          path: test-results/downloaded
          merge-multiple: true
      - name: Generate test dashboard
        run: node scripts/test-dashboard.js --profiles-dir test-results/downloaded
      - name: Upload dashboard
        uses: actions/upload-artifact@v7
        with:
          name: test-dashboard
          path: test-dashboard.json
          retention-days: 7
      - name: Dashboard summary
        if: always()
        run: |
          echo "## Test Quality Dashboard" >> $GITHUB_STEP_SUMMARY
          if [ -f test-dashboard.json ]; then
            cat test-dashboard.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Tests: {d[\"testCount\"]}'); print(f'Suite duration: {d[\"suiteDurationMs\"]}ms'); print(f'Integration skipped: {d[\"integrationSkipped\"]}'); print('Slowest files:'); [print(f'- {item[\"file\"]}: {item[\"durationMs\"]}ms') for item in d.get(\"slowestFiles\", [])[:5]]" >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Dashboard generated" >> $GITHUB_STEP_SUMMARY
          fi
