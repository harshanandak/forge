name: Docs Validation

on:
  push:
    branches: [master]
    paths:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'docs/**'
      - 'bin/**'
      - 'lib/**'
      - 'scripts/**'
      - 'test/docs-command.test.js'
      - '.github/workflows/docs-validation.yml'
  pull_request:
    paths:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'docs/**'
      - 'bin/**'
      - 'lib/**'
      - 'scripts/**'
      - 'test/docs-command.test.js'
      - '.github/workflows/docs-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Docs Linker And Docstring Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - name: Install dependencies
        run: bun install
      - name: Run docs validation
        run: bun ./bin/forge.js docs verify --baseline .github/docs-link-baseline.json --min-docstring-coverage 0
