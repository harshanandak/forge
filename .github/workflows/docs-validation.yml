name: Docs Validation

on:
  push:
    branches: [master]
    paths:
      - '.github/docs-link-baseline.json'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'docs/**'
      - 'bin/**'
      - 'lib/**'
      - 'packages/**'
      - 'scripts/**'
      - 'test/docs-command.test.js'
      - '.github/workflows/docs-validation.yml'
  pull_request:
    paths:
      - '.github/docs-link-baseline.json'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'docs/**'
      - 'bin/**'
      - 'lib/**'
      - 'packages/**'
      - 'scripts/**'
      - 'test/docs-command.test.js'
      - '.github/workflows/docs-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # Current baseline is 35; raise MIN_DOCSTRING_COVERAGE as exported APIs gain docs.
  MIN_DOCSTRING_COVERAGE: ${{ vars.MIN_DOCSTRING_COVERAGE || '35' }}

jobs:
  docs:
    name: Docs Linker And Docstring Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.12
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run docs validation
        run: bun ./bin/forge.js docs verify --baseline .github/docs-link-baseline.json --min-docstring-coverage "$MIN_DOCSTRING_COVERAGE"
