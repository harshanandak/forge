# Bypass for required checks when path-filtered workflows don't trigger.
#
# Problem: test workflows use `paths:` filters so they only run when code files
# change. But these checks are marked Required in branch protection. For
# markdown-only PRs, the real workflows never run, so GitHub shows "Waiting for
# status" forever and blocks the merge.
#
# Solution: This workflow uses `paths-ignore:` with the same paths the real
# workflows use as `paths:`. When a PR only changes non-code files (markdown,
# configs), this workflow runs and reports success for each required check
# name. When code files change, the real workflows handle it instead.
#
# CodeQL and ESLint must run in their real workflows because branch protection
# also requires code-scanning contexts named "CodeQL" and "ESLint"; a bypass job
# cannot create those code-scanning statuses.

name: Required Checks Bypass

on:
  pull_request:
    paths-ignore:
      - 'bin/**'
      - 'lib/**'
      - 'scripts/**'
      - 'packages/**'
      - 'package.json'
      - '*.js'
      - '.claude/**/*.js'
      - '.forge/hooks/**'
      - '.github/workflows/**'

# Limit permissions — these jobs only echo a message
permissions: {}

jobs:
  # Job names MUST match the required check names exactly.

  test-suite:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - run: echo "No code changes — test suite not needed"

  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - run: echo "No code changes — coverage check not needed"

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - run: echo "No code changes — E2E tests not needed"

  test-dashboard:
    name: Test Dashboard (PR)
    runs-on: ubuntu-latest
    steps:
      - run: echo "No code changes — dashboard not needed"

  cross-os-gate:
    name: Cross-OS Gate
    runs-on: ubuntu-latest
    steps:
      - run: echo "No code changes — cross-OS smoke not needed"
