# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# ESLint is a tool for identifying and reporting on patterns
# found in ECMAScript/JavaScript code.
# More details at https://github.com/eslint/eslint
# and https://eslint.org

name: ESLint

on:
  push:
    branches: [ "master" ]
    paths:
      - 'bin/**'
      - 'lib/**'
      - 'scripts/**'
      - 'test/**'
      - 'packages/**'
      - 'package.json'
      - '.github/workflows/**'
      - '*.js'
      - '.claude/**/*.js'
      - '.forge/hooks/**'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'bin/**'
      - 'lib/**'
      - 'scripts/**'
      - 'test/**'
      - 'packages/**'
      - 'package.json'
      - '.github/workflows/**'
      - '*.js'
      - '.claude/**/*.js'
      - '.forge/hooks/**'

jobs:
  eslint:
    name: Run eslint scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run ESLint
        id: lint
        env:
          SARIF_ESLINT_IGNORE_SUPPRESSED: "true"
        run: |
          set +e

          node ./node_modules/eslint/bin/eslint.js . \
            --max-warnings 0 \
            --format @microsoft/eslint-formatter-sarif \
            --output-file eslint-results.sarif
          exit_code=$?

          if [ ! -f eslint-results.sarif ]; then
            printf '%s\n' '{"$schema":"https://json.schemastore.org/sarif-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"ESLint","informationUri":"https://eslint.org","rules":[]}},"results":[]}]}' > eslint-results.sarif
          fi

          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0
        continue-on-error: true

      - name: Upload analysis results to GitHub
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: eslint-results.sarif
          wait-for-processing: true

      - name: Fail on ESLint findings
        if: always() && steps.lint.outputs.exit_code != '0'
        run: exit 1
