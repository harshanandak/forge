updates:
- directory: /
  groups:
    dev-deps:
      dependency-type: development
    production-deps:
      dependency-type: production
  labels:
  - dependencies
  open-pull-requests-limit: 10
  package-ecosystem: npm
  schedule:
    day: monday
    interval: weekly
    time: "07:00"
    timezone: Etc/UTC
- directory: /
  groups:
    all-actions:
      patterns:
      - "*"
  ignore:
  - dependency-name: "github/gh-aw-actions/**" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  labels:
  - github-actions
  - dependencies
  package-ecosystem: github-actions
  schedule:
    day: monday
    interval: weekly
    time: "07:00"
    timezone: Etc/UTC
version: 2
