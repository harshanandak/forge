# Lefthook Git Hooks Configuration
# TDD Enforcement for Forge Workflow
#
# To skip hooks in emergencies:
#   git commit --no-verify  (skip pre-commit)
#   LEFTHOOK=0 git push     (skip pre-push)

commit-msg:
  commands:
    commitlint:
      run: node scripts/commitlint.js {1}
      tags: commitlint

pre-commit:
  commands:
    # Keep the committed .agents/skills mirror byte-identical to canonical skills/.
    # Runs only when skills/** is staged; regenerates + re-stages the mirror so the
    # drift gate never fails on a stale checked-in mirror (single-source, #342).
    sync-agent-skills:
      run: node scripts/sync-agent-skills.js
      stage_fixed: false
      tags: skills
      glob: "skills/**"
    protected-state:
      run: node scripts/protected-state-check.js
      stage_fixed: false
      tags: protected-state
    tdd-check:
      run: node .forge/hooks/check-tdd.js
      stage_fixed: false
      tags: tdd
      glob: "*.{js,ts,jsx,tsx,py,go,java,rb}"

pre-push:
  commands:
    # 1. Block direct push to main/master (dual-layer protection)
    # Uses Node.js for cross-platform compatibility (Windows, macOS, Linux)
    branch-protection:
      run: node scripts/branch-protection.js
      tags: protection
      skip:
        - run: node scripts/check-forge-token.js

    # 2. ESLint check (strict mode: blocks on errors and warnings)
    # Uses Node.js script for cross-platform compatibility
    lint:
      run: node scripts/lint.js
      tags: lint
      skip:
        - run: node scripts/check-forge-token.js

    # 3. Test suite (cross-platform Node.js script detects package manager)
    tests:
      run: node scripts/test.js
      tags: tests
      skip:
        - run: node scripts/check-forge-token.js

    # 4. Team sync — push Beads status to GitHub (non-blocking)
    team-sync:
      run: bash scripts/forge-team/lib/hooks.sh sync --quiet || true
      tags: team

    # 5. Auto-file rail — ensure the branch has a backing Kernel issue so a raw
    # `git push` still auto-files started work (non-blocking; always exits 0).
    auto-backing-issue:
      run: node scripts/auto-backing-issue.js || true
      tags: tracking
