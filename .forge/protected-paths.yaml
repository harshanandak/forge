version: 1
schemaVersion: 1.0.0
kind: ProtectedPathManifest
manifestPath: .forge/protected-paths.yaml
surfaces:
  immutable:
    examples:
      - .git/
    repair: Use git or the owning runtime tool.
  secrets:
    examples:
      - .env.local
      - secrets.json
    repair: Use the secret manager or local environment setup command.
  append_only_logs:
    examples:
      - .forge/log.jsonl
      - .forge/audit.log
      - .beads/interactions.jsonl
    repair: Use the append-only Forge or Beads audit writer.
  beads_state:
    examples:
      - .beads/issues.jsonl
      - .beads/config.yaml
    repair: Use bd or Forge issue commands.
  forge_config:
    examples:
      - .forge/config.yaml
      - .forge/protected-paths.yaml
    repair: Use Forge setup/config commands or the protected Forge API writer.
  extension_manifests:
    examples:
      - .forge/extensions/example/manifest.json
      - .github/PLUGIN_TEMPLATE.json
    repair: Use the Forge extension/plugin manager.
  lockfiles:
    examples:
      - bun.lock
      - package-lock.json
      - .forge/extensions.lock
    repair: Regenerate through the package manager or extension installer.
  workflows:
    examples:
      - .github/workflows/
      - .claude/commands/
      - .forge/hooks/
      - lefthook.yml
    repair: Use Forge workflow/setup commands.
  generated_harness:
    examples:
      - AGENTS.md
      - CLAUDE.md
      - .codex/skills/
      - .cursor/rules/
    repair: Regenerate with forge setup or the owning Forge API surface.
  memory_projection:
    examples:
      - docs/sessions/
      - docs/memory/
      - .forge/memory/
    repair: Use the Forge memory projection writer.
categories:
  - id: forge_core
    mode: checksum-verified
    paths:
      - lib/**
      - bin/**
      - scripts/**
      - skills/**
    ownerSurface: Forge core release or checksum updater
    repairHint: Use the Forge release/update flow; do not hand-edit checksum-protected core files.
  - id: user_protocol
    mode: cli-only
    paths:
      - AGENTS.md
      - CLAUDE.md
      - .cursorrules
      - opencode.json
    ownerSurface: forge setup or forge options
    repairHint: Use Forge setup/options commands so harness protocol files stay synchronized.
  - id: generated_artifacts
    mode: ci-blocked
    paths:
      - .claude/commands/**
      - .claude/skills/**
      - .cursor/rules/**
      - .cursor/skills/**
      - .codex/skills/**
    ownerSurface: Forge harness renderer
    repairHint: Regenerate harness artifacts from the canonical Forge contract.
  - id: append_only_logs
    mode: runtime-only
    paths:
      - .forge/*.jsonl
      - .beads/*.jsonl
    ownerSurface: Forge or Beads audit writer
    repairHint: Append through the runtime writer; do not rewrite audit history.
  - id: secrets
    mode: secret-scan-blocked
    paths:
      - .env
      - .env.*
      - "**/.env"
      - "**/.env.*"
    ownerSurface: secret manager
    repairHint: Move secrets to the configured secret manager or local ignored env file.
  - id: beads_state
    mode: bd-cli-only
    paths:
      - .beads/**
    ownerSurface: bd CLI or Forge issue adapter
    repairHint: Use bd or Forge issue commands instead of editing Beads state files.
  - id: immutable
    mode: tool-owned
    paths:
      - .git/**
      - .hg/**
      - .svn/**
    ownerSurface: VCS tool
    repairHint: Use the owning VCS command instead of editing runtime internals.
